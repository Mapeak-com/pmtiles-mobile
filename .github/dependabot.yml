version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      gradle-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: cargo
    directory: /core
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
