version: 2
updates:
  # GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  # Gradle: the Android library module (AGP, Kotlin plugin, kotlin-stdlib, …).
  # Dependabot scans the directory and its subprojects (pmtiles/).
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for routine minor/patch bumps; majors stay separate to review.
      gradle-minor-patch:
        update-types: ["minor", "patch"]
