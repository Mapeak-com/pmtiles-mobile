name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Rust core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        working-directory: core
        run: cargo test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        working-directory: core
        run: cargo llvm-cov --ignore-filename-regex 'uniffi_bindgen\.rs' --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: core/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  android:
    name: Android AAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: taiki-e/install-action@cargo-ndk
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
      - name: Install NDK
        run: sdkmanager --install "ndk;28.2.13676358"
      - name: Assemble release AAR
        working-directory: android
        run: ./gradlew :pmtiles:assembleRelease --no-daemon --stacktrace
      - uses: actions/upload-artifact@v7
        with:
          name: pmtiles-aar
          path: android/pmtiles/build/outputs/aar/*.aar

  ios:
    name: iOS XCFramework + SwiftPM
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build XCFramework + generate Swift bindings
        run: ./scripts/build-xcframework.sh
      - name: Build SwiftPM package
        run: swift build
