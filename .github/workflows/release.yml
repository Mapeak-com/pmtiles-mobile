name: Release (bump version)

# Manually-triggered release. Pick major / minor / patch and this computes the
# next semver from the latest vX.Y.Z tag, pushes the new tag, and cuts a GitHub
# Release. Tags are the single source of truth: JitPack builds the Android AAR
# from the tag on demand, and SwiftPM resolves the same tag.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Which part of the version to bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full tag history to find the latest version

      - name: Compute next version
        id: next
        run: |
          set -euo pipefail
          latest="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then latest="v0.0.0"; fi
          echo "Latest tag: $latest"

          ver="${latest#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "Next tag:   $next"

          if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
            echo "::error::Tag $next already exists"; exit 1
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.next.outputs.tag }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes

      - name: Warm up JitPack build (best effort)
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          # Requesting build.log makes JitPack build the AAR now, so the first
          # consumer fetch is fast. GITHUB_REPOSITORY is "<owner>/<repo>".
          curl -s -m 300 -o /dev/null \
            "https://jitpack.io/com/github/${GITHUB_REPOSITORY}/${TAG}/build.log" || true
          echo "Requested JitPack build for $TAG (see https://jitpack.io/#${GITHUB_REPOSITORY})"
