name: Release (bump version)

# Manually-triggered release. The `release` job (macOS) builds the iOS
# XCFramework, pins it into Package.swift (url + checksum) on the tagged commit,
# pushes the tag, and creates the GitHub Release. The `android` job (Linux) then
# builds the AAR and uploads it (aar + pom + sources) to the same release.
# JitPack no longer compiles anything — jitpack.yml just downloads these release
# assets and installs them. `main` keeps the path-based Package.swift for local
# dev; only the tag carries the url+checksum.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Which part of the version to bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    outputs:
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full tag history to find the latest version
      - uses: dtolnay/rust-toolchain@stable

      - name: Compute next version
        id: next
        run: |
          set -euo pipefail
          latest="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then latest="v0.0.0"; fi
          ver="${latest#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "Next tag: $next"
          if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
            echo "::error::Tag $next already exists"; exit 1
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"

      - name: Build XCFramework + Swift bindings
        run: ./scripts/build-xcframework.sh

      - name: Package, checksum, and pin Package.swift
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          set -euo pipefail
          ( cd artifacts && zip -qry PMTilesFFI.xcframework.zip PMTilesFFI.xcframework )
          checksum="$(swift package compute-checksum artifacts/PMTilesFFI.xcframework.zip)"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/PMTilesFFI.xcframework.zip"
          python3 - "$url" "$checksum" <<'PY'
          import sys
          url, checksum = sys.argv[1], sys.argv[2]
          path = "Package.swift"
          s = open(path).read()
          old = 'path: "artifacts/PMTilesFFI.xcframework"'
          new = f'url: "{url}",\n            checksum: "{checksum}"'
          assert old in s, "binaryTarget path line not found in Package.swift"
          open(path, "w").write(s.replace(old, new))
          PY

      - name: Commit, tag, and push the tag
        env:
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/PMTiles/pmtiles_core.swift
          git commit -m "release $TAG"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"   # tag only; main stays path-based

      - name: Create GitHub Release + upload XCFramework
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.next.outputs.tag }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" artifacts/PMTilesFFI.xcframework.zip

  android:
    name: Build + attach Android AAR
    needs: release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}   # build from the tagged commit
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
      - name: Install NDK
        run: sdkmanager --install "ndk;28.2.13676358"
      - name: Build + publish the AAR to the local Maven repo
        working-directory: android
        run: VERSION="$TAG" ./gradlew :pmtiles:publishToMavenLocal --no-daemon --stacktrace
      - name: Upload AAR (aar + pom + sources) to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"   # the publication strips the leading v
          M2="$HOME/.m2/repository/com/mapeak/pmtiles/$VER"
          gh release upload "$TAG" \
            "$M2/pmtiles-$VER.aar" \
            "$M2/pmtiles-$VER.pom" \
            "$M2/pmtiles-$VER-sources.jar"
      - name: Warm up JitPack repackage (best effort)
        run: |
          curl -s -m 300 -o /dev/null \
            "https://jitpack.io/com/github/${GITHUB_REPOSITORY}/${TAG}/build.log" || true
          echo "Requested JitPack repackage for $TAG (see https://jitpack.io/#${GITHUB_REPOSITORY})"
