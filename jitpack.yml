jdk:
  - openjdk21

before_install:
  # Install rustup, then add the Android targets (rustup-init's -t takes a single
  # target, so the multi-target list must go through `rustup target add`).
  - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  - export PATH="$HOME/.cargo/bin:$PATH" && rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
  # JitPack's bundled sdkmanager is broken under JDK 17 (javax.xml.bind removed),
  # so install the NDK by direct download into the SDK's ndk/<version> dir.
  - curl -sSL -o /tmp/ndk.zip https://dl.google.com/android/repository/android-ndk-r28c-linux.zip && unzip -q /tmp/ndk.zip -d /tmp/ndkx && mkdir -p "${ANDROID_HOME:-/opt/android-sdk-linux}/ndk" && mv /tmp/ndkx/android-ndk-r28c "${ANDROID_HOME:-/opt/android-sdk-linux}/ndk/28.2.13676358"

install:
  - export PATH="$HOME/.cargo/bin:$PATH" && cd android && ./gradlew :pmtiles:publishToMavenLocal --no-daemon --stacktrace
