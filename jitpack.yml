jdk:
  - openjdk17

before_install:
  - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y -t aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
  - yes | sdkmanager --licenses > /dev/null 2>&1 || true
  - sdkmanager "ndk;28.2.13676358"

install:
  - export PATH="$HOME/.cargo/bin:$PATH" && cd android && ./gradlew :pmtiles:publishToMavenLocal --no-daemon --stacktrace
